services:
  backend:
    build:
      context: ../../backend
      dockerfile: personal/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../../backend/personal/.env.example
    environment:
      - DATABASE_URL=sqlite:///./data/catchnews.db
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
    volumes:
      - ../../backend/personal/data:/backend/personal/data
      - ../../backend/personal/cache:/backend/personal/cache
    restart: unless-stopped

  frontend:
    build:
      context: ../../frontend/personal
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_AUTO_REFRESH_MS=900000
    depends_on:
      - backend
    restart: unless-stopped
